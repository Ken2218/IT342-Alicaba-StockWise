# Server Port (matches your React axios URL)
server.port=8080

# XAMPP MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/alicaba_stockwise_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
# 'update' automatically creates your 'users' table if it doesn't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect